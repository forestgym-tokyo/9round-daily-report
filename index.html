<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>9ROUND 日報</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>9ROUND アリオ蘇我店 日報</h1>

  <div class="card">
    <label>営業日</label>
    <input type="date" id="workDate">
  </div>

  <div class="card">
    <label>担当者</label>
    <select id="staff">
      <option value="">読み込み中...</option>
    </select>
  </div>

  <div class="card">
    <label>担当レッスン枠</label>

    <div id="lessonSlots"></div>
  </div>

  <div class="card">
    <label>会員対応数</label>
    <input type="number" id="memberCount" min="0">
  </div>

  <div class="card">
    <h2>清掃状況</h2>

    <div id="cleaningArea"></div>
  </div>

  <div class="card">
    <h2>要望・クレーム</h2>

    <div id="requestContainer"></div>

    <button type="button" onclick="addRequest()">
      ＋追加
    </button>
  </div>

  <div class="card">
    <h2>設備異常</h2>

    <label>
      <input type="radio" name="equipmentIssue" value="なし" checked>
      なし
    </label>

    <label>
      <input type="radio" name="equipmentIssue" value="あり">
      あり
    </label>

    <textarea
      id="equipmentDetail"
      placeholder="内容"
    ></textarea>

    <select id="equipmentUrgency">
      <option value="">緊急度選択</option>
      <option value="低">低</option>
      <option value="中">中</option>
      <option value="高">高</option>
    </select>

    <input type="file" id="equipmentPhoto" accept="image/*">
  </div>

  <div class="card">
    <h2>備品破損・不足</h2>

    <label>
      <input type="radio" name="supplyIssue" value="なし" checked>
      なし
    </label>

    <label>
      <input type="radio" name="supplyIssue" value="あり">
      あり
    </label>

    <textarea
      id="supplyDetail"
      placeholder="内容"
    ></textarea>
  </div>

  <div class="card">
    <h2>引継ぎ事項</h2>

    <textarea id="handover"></textarea>
  </div>

  <div class="card">
    <h2>コメント</h2>

    <textarea id="comment"></textarea>
  </div>

  <div
    class="card"
    id="mallProSection"
    style="display:none;"
  >
    <label>
      <input
        type="checkbox"
        id="mallProDone"
      >
      モールプロの退勤報告を完了しました
    </label>
  </div>

  <button
    id="submitBtn"
    class="submit-btn"
    onclick="submitReport()"
  >
    日報を送信する
  </button>

</div>

<script src="script.js"></script>

</body>
</html>
